name: tests in docker
on:
  push:

env:
  OPAMROOT: /home/user/.opam
  OPAMCONFIRMLEVEL: unsafe-yes

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: trickyfoxy/lama_truffle

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - run: opam --version
      - run: whoami
      - run: opam exec -- ocamlopt --version

      - name: Checkout code
        uses: actions/checkout@v4

      - name: build truffle
        timeout-minutes: 10
        run: mvn package

      - name: run regression tests
        working-directory: tests
        timeout-minutes: 10
        run: ./run-regression-tests.sh
